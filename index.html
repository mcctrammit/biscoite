<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard VTEX - Trammit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Base (dark-first) */
            --bg-primary: #0F1115;
            --bg-surface: #1E2027;
            --border-color: #2A2D36;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A3BD;

            /* Roxo (identidade) */
            --purple-main: #6B5CFF;
            --purple-dark: #3F4499;
            --purple-light: #C9C3FF;
            --blue-accent: #4F6EDC;

            /* Cores de dados */
            --positive: #06D6A0;
            --positive-alt: #00C896;
            --negative: #E63946;
            --negative-alt: #FF5A5F;
            --highlight: #FFD166;
            --highlight-alt: #FFC300;
            --comparison: #48CAE4;
            --comparison-alt: #90E0EF;
            --accent-pink: #F72585;
            --accent-magenta: #D946EF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--purple-main);
        }

        .filters {
            background: var(--bg-surface);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .filter-group label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        select, input[type="date"], input[type="text"] {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            min-width: 180px;
            transition: all 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--purple-main);
            box-shadow: 0 0 0 3px rgba(107, 92, 255, 0.1);
        }

        select:hover, input:hover {
            border-color: var(--purple-dark);
        }

        button {
            background: var(--purple-main);
            color: var(--text-primary);
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--purple-dark);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: var(--border-color);
            cursor: not-allowed;
            transform: none;
        }

        .custom-dates {
            display: none;
            gap: 15px;
        }

        .custom-dates.active {
            display: flex;
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .metric-card {
            background: var(--bg-surface);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .metric-card.gmv::before { background: var(--purple-main); }
        .metric-card.orders::before { background: var(--comparison); }
        .metric-card.ticket::before { background: var(--highlight); }
        .metric-card.canceled::before { background: var(--negative); }

        .metric-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .metric-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .metric-card.gmv .metric-value { color: var(--purple-main); }
        .metric-card.orders .metric-value { color: var(--comparison); }
        .metric-card.ticket .metric-value { color: var(--highlight); }
        .metric-card.canceled .metric-value { color: var(--negative); }

        .metric-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: var(--bg-surface);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .chart-container {
            height: 300px;
        }

        .table-card {
            background: var(--bg-surface);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            border-bottom: 2px solid var(--border-color);
        }

        th {
            text-align: left;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        td {
            padding: 12px;
            font-size: 14px;
            border-bottom: 1px solid var(--border-color);
        }

        tbody tr:hover {
            background: rgba(107, 92, 255, 0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-invoiced { background: rgba(6, 214, 160, 0.2); color: var(--positive); }
        .status-canceled { background: rgba(230, 57, 70, 0.2); color: var(--negative); }
        .status-payment-approved { background: rgba(255, 209, 102, 0.2); color: var(--highlight); }
        .status-ready-for-handling { background: rgba(72, 202, 228, 0.2); color: var(--comparison); }
        .status-window-to-cancel { background: rgba(230, 57, 70, 0.2); color: var(--negative); }
        .status-default { background: rgba(160, 163, 189, 0.2); color: var(--text-secondary); }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--purple-main);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(230, 57, 70, 0.1);
            border: 1px solid var(--negative);
            color: var(--negative);
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
                align-items: stretch;
            }

            .filter-group {
                width: 100%;
            }

            select, input {
                width: 100%;
            }

            .charts {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Dashboard VTEX</h1>
            <p style="color: var(--text-secondary);">Análise de pedidos e métricas</p>
        </header>

        <div class="filters">
            <div class="filter-group">
                <label for="period-select">Período</label>
                <select id="period-select">
                    <option value="today">Hoje</option>
                    <option value="yesterday">Ontem</option>
                    <option value="7d">Últimos 7 dias</option>
                    <option value="30d" selected>Últimos 30 dias</option>
                    <option value="month">Mês atual</option>
                    <option value="custom">Personalizado</option>
                </select>
            </div>

            <div class="custom-dates" id="custom-dates">
                <div class="filter-group">
                    <label for="date-start">Data inicial</label>
                    <input type="date" id="date-start">
                </div>
                <div class="filter-group">
                    <label for="date-end">Data final</label>
                    <input type="date" id="date-end">
                </div>
            </div>

            <div class="filter-group">
                <label for="status-filter">Status</label>
                <select id="status-filter">
                    <option value="all">Todos os status</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="search-order">Buscar pedido</label>
                <input type="text" id="search-order" placeholder="ID do pedido...">
            </div>

            <div class="filter-group">
                <label>&nbsp;</label>
                <button id="load-btn">Carregar dados</button>
            </div>
        </div>

        <div id="error-container"></div>
        <div id="loading-container"></div>

        <div id="content" style="display: none;">
            <div class="metrics">
                <div class="metric-card gmv">
                    <div class="metric-label">GMV Total</div>
                    <div class="metric-value" id="gmv-value">R$ 0,00</div>
                    <div class="metric-subtitle">Faturamento bruto</div>
                </div>
                <div class="metric-card orders">
                    <div class="metric-label">Total de Pedidos</div>
                    <div class="metric-value" id="orders-value">0</div>
                    <div class="metric-subtitle">Pedidos no período</div>
                </div>
                <div class="metric-card ticket">
                    <div class="metric-label">Ticket Médio</div>
                    <div class="metric-value" id="ticket-value">R$ 0,00</div>
                    <div class="metric-subtitle">Valor médio por pedido</div>
                </div>
                <div class="metric-card canceled">
                    <div class="metric-label">Cancelados</div>
                    <div class="metric-value" id="canceled-value">0</div>
                    <div class="metric-subtitle" id="canceled-percent">0% do total</div>
                </div>
            </div>

            <div class="charts">
                <div class="chart-card">
                    <div class="chart-title">Pedidos por Status</div>
                    <div class="chart-container">
                        <canvas id="status-chart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <div class="chart-title">GMV por Dia</div>
                    <div class="chart-container">
                        <canvas id="gmv-chart"></canvas>
                    </div>
                </div>
            </div>

            <div class="table-card">
                <div class="chart-title">Últimos Pedidos</div>
                <table>
                    <thead>
                        <tr>
                            <th>ID Pedido</th>
                            <th>Data</th>
                            <th>Status</th>
                            <th>Valor</th>
                            <th>Cliente</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        // Configuração
        const PROXY_URL = '/api/proxy'; // Proxy Vercel
        let allOrders = [];
        let statusChart = null;
        let gmvChart = null;

        // Status considerados como cancelados
        const canceledStatuses = [
            'canceled',
            'window-to-cancel'
        ];

        // Labels amigáveis para status
        function statusLabel(status) {
            const labels = {
                'invoiced': 'Faturado',
                'canceled': 'Cancelado',
                'payment-approved': 'Pagamento Aprovado',
                'ready-for-handling': 'Pronto para Envio',
                'window-to-cancel': 'Janela de Cancelamento',
                'payment-pending': 'Pagamento Pendente',
                'handling': 'Em Manuseio',
                'order-completed': 'Pedido Completo'
            };
            return labels[status] || status.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        // Cores para status
        function getStatusColor(status) {
            const colors = {
                'invoiced': getComputedStyle(document.documentElement).getPropertyValue('--positive').trim(),
                'canceled': getComputedStyle(document.documentElement).getPropertyValue('--negative').trim(),
                'window-to-cancel': getComputedStyle(document.documentElement).getPropertyValue('--negative').trim(),
                'payment-approved': getComputedStyle(document.documentElement).getPropertyValue('--highlight').trim(),
                'ready-for-handling': getComputedStyle(document.documentElement).getPropertyValue('--comparison').trim(),
                'handling': getComputedStyle(document.documentElement).getPropertyValue('--blue-accent').trim(),
                'payment-pending': getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim(),
                'order-completed': getComputedStyle(document.documentElement).getPropertyValue('--positive-alt').trim()
            };
            return colors[status] || getComputedStyle(document.documentElement).getPropertyValue('--text-secondary').trim();
        }

        // Classe para status badge
        function getStatusBadgeClass(status) {
            const classes = {
                'invoiced': 'status-invoiced',
                'canceled': 'status-canceled',
                'window-to-cancel': 'status-window-to-cancel',
                'payment-approved': 'status-payment-approved',
                'ready-for-handling': 'status-ready-for-handling'
            };
            return classes[status] || 'status-default';
        }

        // Formatar moeda
        function formatCurrency(value) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(value / 100);
        }

        // Formatar data
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        // Calcular período
        function calculatePeriod(period) {
            const end = new Date();
            end.setHours(23, 59, 59, 999);
            let start = new Date();

            switch(period) {
                case 'today':
                    start.setHours(0, 0, 0, 0);
                    break;
                case 'yesterday':
                    start.setDate(start.getDate() - 1);
                    start.setHours(0, 0, 0, 0);
                    end.setDate(end.getDate() - 1);
                    end.setHours(23, 59, 59, 999);
                    break;
                case '7d':
                    start.setDate(start.getDate() - 7);
                    start.setHours(0, 0, 0, 0);
                    break;
                case '30d':
                    start.setDate(start.getDate() - 30);
                    start.setHours(0, 0, 0, 0);
                    break;
                case 'month':
                    start = new Date(start.getFullYear(), start.getMonth(), 1);
                    start.setHours(0, 0, 0, 0);
                    break;
                case 'custom':
                    const startInput = document.getElementById('date-start').value;
                    const endInput = document.getElementById('date-end').value;
                    if (startInput && endInput) {
                        start = new Date(startInput);
                        end = new Date(endInput);
                        end.setHours(23, 59, 59, 999);
                    }
                    break;
            }

            return { start, end };
        }

        // Buscar TODOS os pedidos com paginação (SEM chunking por data)
        async function fetchAllOrders(startDate, endDate) {
            const allOrders = [];
            let page = 1;
            const perPage = 100;
            let hasMore = true;

            const startISO = startDate.toISOString();
            const endISO = endDate.toISOString();

            console.log(`Buscando pedidos de ${formatDate(startISO)} até ${formatDate(endISO)}`);

            while (hasMore) {
                try {
                    const queryPath = `/orders?f_creationDate=creationDate:[${startISO} TO ${endISO}]&page=${page}&per_page=${perPage}&orderBy=creationDate,desc`;
                    
                    const response = await fetch(`${PROXY_URL}?path=${encodeURIComponent(queryPath)}`, {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(`Erro na API: ${response.status} - ${errorData.error || errorData.message || 'Erro desconhecido'}`);
                    }

                    const data = await response.json();
                    
                    if (data.list && data.list.length > 0) {
                        allOrders.push(...data.list);
                        console.log(`Página ${page}: ${data.list.length} pedidos carregados (total: ${allOrders.length})`);
                        page++;
                        
                        // Verificar se há mais páginas
                        if (data.list.length < perPage) {
                            hasMore = false;
                        }
                    } else {
                        hasMore = false;
                    }

                    // Delay para evitar rate limit
                    await new Promise(resolve => setTimeout(resolve, 200));

                } catch (error) {
                    console.error(`Erro na página ${page}:`, error);
                    throw error;
                }
            }

            console.log(`Total de pedidos carregados: ${allOrders.length}`);
            return allOrders;
        }

        // Mostrar loading
        function showLoading() {
            document.getElementById('content').style.display = 'none';
            document.getElementById('error-container').innerHTML = '';
            document.getElementById('loading-container').innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Carregando dados...</p>
                </div>
            `;
        }

        // Esconder loading
        function hideLoading() {
            document.getElementById('loading-container').innerHTML = '';
            document.getElementById('content').style.display = 'block';
        }

        // Mostrar erro
        function showError(message) {
            document.getElementById('loading-container').innerHTML = '';
            document.getElementById('error-container').innerHTML = `
                <div class="error">
                    <strong>Erro:</strong> ${message}
                </div>
            `;
        }

        // Popular filtro de status
        function populateStatusFilter(orders) {
            const statusFilter = document.getElementById('status-filter');
            const allStatuses = [...new Set(orders.map(o => o.status))].sort();
            
            // Limpar opções existentes (exceto "Todos")
            statusFilter.innerHTML = '<option value="all">Todos os status</option>';
            
            // Adicionar status encontrados
            allStatuses.forEach(status => {
                const option = document.createElement('option');
                option.value = status;
                option.textContent = statusLabel(status);
                statusFilter.appendChild(option);
            });
        }

        // Filtrar pedidos
        function filterOrders() {
            let filtered = [...allOrders];

            // Filtro por status
            const selectedStatus = document.getElementById('status-filter').value;
            if (selectedStatus !== 'all') {
                filtered = filtered.filter(o => o.status === selectedStatus);
            }

            // Filtro por busca de pedido
            const searchTerm = document.getElementById('search-order').value.trim();
            if (searchTerm) {
                filtered = filtered.filter(o => o.orderId.toLowerCase().includes(searchTerm.toLowerCase()));
            }

            return filtered;
        }

        // Atualizar dashboard
        function updateDashboard(orders) {
            // GMV
            const gmv = orders.reduce((sum, o) => sum + (o.totalValue || 0), 0);
            document.getElementById('gmv-value').textContent = formatCurrency(gmv);

            // Total de pedidos
            document.getElementById('orders-value').textContent = orders.length;

            // Ticket médio
            const avgTicket = orders.length > 0 ? gmv / orders.length : 0;
            document.getElementById('ticket-value').textContent = formatCurrency(avgTicket);

            // Cancelados
            const canceled = orders.filter(o => canceledStatuses.includes(o.status)).length;
            const canceledPercent = orders.length > 0 ? ((canceled / orders.length) * 100).toFixed(1) : 0;
            document.getElementById('canceled-value').textContent = canceled;
            document.getElementById('canceled-percent').textContent = `${canceledPercent}% do total`;

            // Atualizar gráficos
            updateStatusChart(orders);
            updateGMVChart(orders);

            // Atualizar tabela
            updateOrdersTable(orders);
        }

        // Atualizar gráfico de status
        function updateStatusChart(orders) {
            const statusCounts = {};
            orders.forEach(o => {
                statusCounts[o.status] = (statusCounts[o.status] || 0) + 1;
            });

            const labels = Object.keys(statusCounts).map(s => statusLabel(s));
            const data = Object.values(statusCounts);
            const colors = Object.keys(statusCounts).map(s => getStatusColor(s));

            const ctx = document.getElementById('status-chart');
            
            if (statusChart) {
                statusChart.destroy();
            }

            statusChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors,
                        borderWidth: 2,
                        borderColor: getComputedStyle(document.documentElement).getPropertyValue('--bg-surface')
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: getComputedStyle(document.documentElement).getPropertyValue('--text-primary'),
                                padding: 15,
                                font: { size: 12 }
                            }
                        }
                    }
                }
            });
        }

        // Atualizar gráfico de GMV
        function updateGMVChart(orders) {
            // Agrupar por dia
            const dailyGMV = {};
            orders.forEach(o => {
                const date = formatDate(o.creationDate);
                dailyGMV[date] = (dailyGMV[date] || 0) + (o.totalValue || 0);
            });

            const sortedDates = Object.keys(dailyGMV).sort((a, b) => {
                const [dayA, monthA, yearA] = a.split('/');
                const [dayB, monthB, yearB] = b.split('/');
                return new Date(yearA, monthA - 1, dayA) - new Date(yearB, monthB - 1, dayB);
            });

            const labels = sortedDates;
            const data = sortedDates.map(d => dailyGMV[d] / 100);

            const ctx = document.getElementById('gmv-chart');
            
            if (gmvChart) {
                gmvChart.destroy();
            }

            gmvChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'GMV (R$)',
                        data: data,
                        borderColor: getComputedStyle(document.documentElement).getPropertyValue('--purple-main'),
                        backgroundColor: 'rgba(107, 92, 255, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary'),
                                callback: function(value) {
                                    return 'R$ ' + value.toLocaleString('pt-BR');
                                }
                            },
                            grid: {
                                color: getComputedStyle(document.documentElement).getPropertyValue('--border-color')
                            }
                        },
                        x: {
                            ticks: {
                                color: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary')
                            },
                            grid: {
                                color: getComputedStyle(document.documentElement).getPropertyValue('--border-color')
                            }
                        }
                    }
                }
            });
        }

        // Atualizar tabela de pedidos
        function updateOrdersTable(orders) {
            const tbody = document.getElementById('orders-table');
            tbody.innerHTML = '';

            // Mostrar últimos 50 pedidos
            const displayOrders = orders.slice(0, 50);

            displayOrders.forEach(order => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${order.orderId}</td>
                    <td>${formatDate(order.creationDate)}</td>
                    <td><span class="status-badge ${getStatusBadgeClass(order.status)}">${statusLabel(order.status)}</span></td>
                    <td>${formatCurrency(order.totalValue)}</td>
                    <td>${order.clientName || 'N/A'}</td>
                `;
                tbody.appendChild(tr);
            });

            if (displayOrders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-secondary);">Nenhum pedido encontrado</td></tr>';
            }
        }

        // Carregar dados
        async function loadData() {
            try {
                showLoading();

                const period = document.getElementById('period-select').value;
                const { start, end } = calculatePeriod(period);

                // Buscar TODOS os pedidos (sem chunking)
                allOrders = await fetchAllOrders(start, end);

                // Popular filtro de status
                populateStatusFilter(allOrders);

                // Aplicar filtros e atualizar dashboard
                const filtered = filterOrders();
                updateDashboard(filtered);

                hideLoading();

            } catch (error) {
                console.error('Erro ao carregar dados:', error);
                showError(error.message);
            }
        }

        // Event listeners
        document.getElementById('load-btn').addEventListener('click', loadData);

        document.getElementById('period-select').addEventListener('change', (e) => {
            const customDates = document.getElementById('custom-dates');
            if (e.target.value === 'custom') {
                customDates.classList.add('active');
            } else {
                customDates.classList.remove('active');
                loadData();
            }
        });

        document.getElementById('status-filter').addEventListener('change', () => {
            if (allOrders.length > 0) {
                const filtered = filterOrders();
                updateDashboard(filtered);
            }
        });

        document.getElementById('search-order').addEventListener('input', () => {
            if (allOrders.length > 0) {
                const filtered = filterOrders();
                updateDashboard(filtered);
            }
        });

        // Carregar dados iniciais
        loadData();
    </script>
</body>
</html>
